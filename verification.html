<!DOCTYPE html>
<html>
    <head>
        <title> Verification Room</title>
        <link rel="stylesheet" href="verification.css">
    </head>

    <body>
<!-- Game World Container-->
 <div id="game-world">
    <!-- mini him (player)-->
     <div id="mini-him"></div>

    <!-- mini her (your character)-->
     <div id="mini-me"></div> 
     <div id="speech-bubble" class="hidden"></div>

    <!-- question icon (pixel dog)-->
     <div class="question-icon" id="q1"></div>
     <div class="question-icon" id="q2"></div>
     <div class="question-icon" id="q3"></div>
     <div class="question-icon" id="q4"></div>

     <!-- progress box-->
  <div id="progress-box">
    Verification Progress <br>
    <span id="progress-text">0 / 4 Verified</span>
  </div>

  <!-- ending screen (hidden at start)-->
   <div id="ending-screen" class="hidden"> 

    <div id="ending-title">Verification Complete</div>

    <div id="ending-message">Ending message will appear here</div>

    <a href="invitation.html"
    <button id="invite-btn" class="hidden"> 
        Receive Coordinates.
    </button>
    </a>
   </div>

    <!-- Dialogue / Question Box (hidden at start) -->
     <div id="dialogue-box" class="hidden">

     <div id="dialogue-title">Agent Verification</div>

     <div id="dialogue-question">Question will appear here</div>

     <div id="mcq-options"></div>

     <div id="dialogue-result"></div>

 </div>

<script src="script.js"></script> 

    </body>
</html>
